<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ Mặt Trời</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    overflow: hidden;
    font-family: Arial;
}

/* HOME */
.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
    padding: 10px;
    background: #00c6ff;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* SUN */
.sun {
    width: 80px;
    height: 80px;
    background: orange;
    border-radius: 50%;
    box-shadow: 0 0 50px orange;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ORBIT */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; /* 🔥 FIX */
}

/* SPIN */
.spin {
    width: 100%;
    height: 100%;
    animation: spin linear infinite;
    position: relative;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* PLANET */
.planet {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    pointer-events: auto; /* 🔥 FIX */
    z-index: 10;
}

.planet img {
    border-radius: 50%;
    display: block;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 8px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>

<div class="sun"></div>

<!-- PLANETS (ảnh fix cứng, không lỗi nữa) -->
<script>
const planets = [
 {name:"mercury", size:20, orbit:120, speed:8, img:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg"},
 {name:"venus", size:25, orbit:160, speed:12, img:"https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg"},
 {name:"earth", size:28, orbit:200, speed:15, img:"https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg"},
 {name:"mars", size:22, orbit:240, speed:18, img:"https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg"},
 {name:"jupiter", size:50, orbit:300, speed:25, img:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg"},
 {name:"saturn", size:45, orbit:360, speed:30, img:"https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg"},
 {name:"uranus", size:35, orbit:420, speed:35, img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg"},
 {name:"neptune", size:33, orbit:480, speed:40, img:"https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg"},
];

planets.forEach(p => {
    const orbit = document.createElement("div");
    orbit.className = "orbit";
    orbit.style.width = p.orbit+"px";
    orbit.style.height = p.orbit+"px";

    const spin = document.createElement("div");
    spin.className = "spin";
    spin.style.animationDuration = p.speed+"s";

    const planet = document.createElement("div");
    planet.className = "planet";
    planet.innerHTML = `<img src="${p.img}" width="${p.size}">`;
    planet.onclick = () => openPlanet(p.name);

    spin.appendChild(planet);
    orbit.appendChild(spin);
    document.body.appendChild(orbit);
});
</script>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
  <div class="card" id="card"></div>
</div>

<script>
const info = {
 mercury:"Sao Thủy - gần Mặt Trời nhất 🔥",
 venus:"Sao Kim - nóng nhất 🌡️",
 earth:"Trái Đất - sự sống 🌍",
 mars:"Sao Hỏa - hành tinh đỏ 🔴",
 jupiter:"Sao Mộc - lớn nhất 🪐",
 saturn:"Sao Thổ - có vành 💍",
 uranus:"Thiên Vương - nghiêng 😵",
 neptune:"Hải Vương - xa nhất 🌊"
};

function openPlanet(name){
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("card").innerHTML = `
        <h2>${info[name]}</h2>
        <button onclick="closeOverlay()">Đóng</button>
    `;
}

function closeOverlay(){
    document.getElementById("overlay").style.display = "none";
}

function goHome(){
    window.location.href = "home.html";
}
</script>

</body>
