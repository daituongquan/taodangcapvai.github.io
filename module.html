<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ Mặt Trời</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
    background-image: url('https://c.pxhere.com/photos/39/83/astronomy_constellation_dark_galaxy_night_night_sky_orion_space-1563485.jpg!d');
    background-size: cover;
}

h2 { text-align: center; }

.solar-container {
    position: relative;
    width: 90vmin;
    height: 90vmin;
    margin: auto;
    margin-top: 20px;
}

.sun {
    width: 10vmin;
    height: 10vmin;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: orange;
    box-shadow: 0 0 40px orange;
}

.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px;
    background: #00c6ff;
    border: none;
    color: white;
    cursor: pointer;
    z-index: 999;
}

/* ORBIT */
.o {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    pointer-events: none; /* 🔥 không chặn click */
}

.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: rotate linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* PLANET */
.planet {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    pointer-events: auto;
}

.planet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.planet:hover {
    transform: translate(-50%, -50%) scale(1.5);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.overlay.active {
    display: flex;
}

.overlay-content {
    background: #111;
    padding: 20px;
    border-radius: 10px;
}

.planet-page { display: none; }
.planet-page.active { display: block; }
</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>

<h2>Hệ Mặt Trời</h2>

<div class="solar-container">

<div class="sun"></div>

<!-- 8 hành tinh -->
<div class="o" style="width:18vmin;height:18vmin;">
<div class="orbit" style="animation-duration:20s;">
<div class="planet" style="width:2vmin;height:2vmin;" onclick="openOverlay('mercury')">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg">
</div></div></div>

<div class="o" style="width:26vmin;height:26vmin;">
<div class="orbit" style="animation-duration:30s;">
<div class="planet" style="width:3vmin;height:3vmin;" onclick="openOverlay('venus')">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg">
</div></div></div>

<div class="o" style="width:34vmin;height:34vmin;">
<div class="orbit" style="animation-duration:40s;">
<div class="planet" style="width:3.2vmin;height:3.2vmin;" onclick="openOverlay('earth')">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div></div></div>

<div class="o" style="width:42vmin;height:42vmin;">
<div class="orbit" style="animation-duration:50s;">
<div class="planet" style="width:2.5vmin;height:2.5vmin;" onclick="openOverlay('mars')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">
</div></div></div>

<div class="o" style="width:52vmin;height:52vmin;">
<div class="orbit" style="animation-duration:70s;">
<div class="planet" style="width:6vmin;height:6vmin;" onclick="openOverlay('jupiter')">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg">
</div></div></div>

<div class="o" style="width:62vmin;height:62vmin;">
<div class="orbit" style="animation-duration:90s;">
<div class="planet" style="width:5.5vmin;height:5.5vmin;" onclick="openOverlay('saturn')">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg">
</div></div></div>

<div class="o" style="width:72vmin;height:72vmin;">
<div class="orbit" style="animation-duration:110s;">
<div class="planet" style="width:4.5vmin;height:4.5vmin;" onclick="openOverlay('uranus')">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg">
</div></div></div>

<div class="o" style="width:82vmin;height:82vmin;">
<div class="orbit" style="animation-duration:130s;">
<div class="planet" style="width:4.3vmin;height:4.3vmin;" onclick="openOverlay('neptune')">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg">
</div></div></div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
<div class="overlay-content">

<div id="mercury-page" class="planet-page active"><h1>Sao Thủy</h1></div>
<div id="venus-page" class="planet-page"><h1>Sao Kim</h1></div>
<div id="earth-page" class="planet-page"><h1>Trái Đất</h1></div>
<div id="mars-page" class="planet-page"><h1>Sao Hỏa</h1></div>
<div id="jupiter-page" class="planet-page"><h1>Sao Mộc</h1></div>
<div id="saturn-page" class="planet-page"><h1>Sao Thổ</h1></div>
<div id="uranus-page" class="planet-page"><h1>Sao Thiên Vương</h1></div>
<div id="neptune-page" class="planet-page"><h1>Sao Hải Vương</h1></div>

<button onclick="closeOverlay()">Đóng</button>

</div>
</div>

<script>
function goHome() {
    window.location.href = "home.html";
}

function openOverlay(name) {
    document.getElementById("overlay").classList.add("active");
    document.querySelectorAll(".planet-page").forEach(p => p.classList.remove("active"));
    document.getElementById(name + "-page").classList.add("active");
}

function closeOverlay() {
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
