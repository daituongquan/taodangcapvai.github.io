<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ Mặt Trời</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background-image: url('https://c.pxhere.com/photos/39/83/astronomy_constellation_dark_galaxy_night_night_sky_orion_space-1563485.jpg!d');
    background-size: cover;
}

h2 { text-align: center; }

.solar-container {
    position: relative;
    width: 90vmin;
    height: 90vmin;
    margin: auto;
    margin-top: 20px;
}

.sun {
    width: 10vmin;
    height: 10vmin;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHiTs_vwFJ9RjqFIzYS8NjQlhOckrzsiIfDw&s');
    background-size: cover;
    box-shadow: 0 0 40px orange;
}

.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: #00c6ff;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    z-index: 999;
}

.o {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: rotate linear infinite;
}

.planet {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-50%, -50%);
    width: 3vmin;
    height: 3vmin;
    cursor: pointer;
    border-radius: 50%;
    overflow: hidden;
    z-index: 10;
}

.planet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.planet:hover {
    transform: translate(-50%, -50%) scale(1.8);
}

@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.overlay.active {
    display: flex;
}

.overlay-content {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    max-height: 90vh;
    overflow-y: auto;
}

.planet-page { display: none; }
.planet-page.active { display: block; }

button {
    margin-top: 20px;
    padding: 10px;
}
</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>

<h2>Hệ Mặt Trời</h2>

<div class="solar-container">
<div class="sun"></div>

<!-- 8 hành tinh -->
<div class="o" style="width:18vmin;height:18vmin;animation-duration:20s;"><div class="planet" onclick="openOverlay('mercury')"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg"></div></div>
<div class="o" style="width:26vmin;height:26vmin;animation-duration:30s;"><div class="planet" onclick="openOverlay('venus')"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg"></div></div>
<div class="o" style="width:34vmin;height:34vmin;animation-duration:40s;"><div class="planet" onclick="openOverlay('earth')"><img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg"></div></div>
<div class="o" style="width:42vmin;height:42vmin;animation-duration:50s;"><div class="planet" onclick="openOverlay('mars')"><img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg"></div></div>
<div class="o" style="width:52vmin;height:52vmin;animation-duration:70s;"><div class="planet" onclick="openOverlay('jupiter')"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg"></div></div>
<div class="o" style="width:62vmin;height:62vmin;animation-duration:90s;"><div class="planet" onclick="openOverlay('saturn')"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg"></div></div>
<div class="o" style="width:72vmin;height:72vmin;animation-duration:110s;"><div class="planet" onclick="openOverlay('uranus')"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg"></div></div>
<div class="o" style="width:82vmin;height:82vmin;animation-duration:130s;"><div class="planet" onclick="openOverlay('neptune')"><img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg"></div></div>

</div>

<div id="overlay" class="overlay">
<div class="overlay-content">

<div id="mercury-page" class="planet-page active"><h1>Sao Thủy</h1></div>
<div id="venus-page" class="planet-page"><h1>Sao Kim</h1></div>
<div id="earth-page" class="planet-page"><h1>Trái Đất</h1></div>
<div id="mars-page" class="planet-page"><h1>Sao Hỏa</h1></div>
<div id="jupiter-page" class="planet-page"><h1>Sao Mộc</h1></div>
<div id="saturn-page" class="planet-page"><h1>Sao Thổ</h1></div>
<div id="uranus-page" class="planet-page"><h1>Sao Thiên Vương</h1></div>
<div id="neptune-page" class="planet-page"><h1>Sao Hải Vương</h1></div>

<button onclick="closeOverlay()">Quay lại</button>

</div>
</div>

<!-- FIREBASE FIX -->

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaz1AZHFulAGimlsg98v-jk9mCsjE45Vw",
  authDomain: "password-webtaodangcapvai.firebaseapp.com",
  projectId: "password-webtaodangcapvai",
  storageBucket: "password-webtaodangcapvai.appspot.com",
  messagingSenderId: "733412823271",
  appId: "1:733412823271:web:70e99dccb5169256925242"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let checked = false;

onAuthStateChanged(auth, user => {
  if (checked) return;
  checked = true;

  if (!user) {
    setTimeout(() => {
      window.location.href = "index.html";
    }, 500);
  }
});
</script>

<script>
function goHome() {
    window.location.href = "home.html";
}

function openOverlay(name) {
    document.getElementById("overlay").classList.add("active");
    document.querySelectorAll(".planet-page").forEach(p => p.classList.remove("active"));
    document.getElementById(name + "-page").classList.add("active");
}

function closeOverlay() {
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
