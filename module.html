<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ Mặt Trời Pro Max</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* nền sao */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.2;
}

/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: #00c6ff;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    z-index: 9999;
}

/* SUN */
.sun {
    width: 80px;
    height: 80px;
    background: orange;
    border-radius: 50%;
    box-shadow: 0 0 50px orange;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ORBIT */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

/* SPIN */
.spin {
    width: 100%;
    height: 100%;
    animation: spin linear infinite;
    position: relative;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* PLANET */
.planet {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-50%, -50%);
    cursor: pointer;
}

.planet img {
    border-radius: 50%;
    transition: 0.3s;
}

.planet:hover img {
    transform: scale(1.3);
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    animation: zoom 0.3s ease;
}

@keyframes zoom {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>

<div class="sun"></div>

<!-- PLANETS -->
<script>
const planets = [
 {name:"mercury", size:20, orbit:120, speed:8},
 {name:"venus", size:25, orbit:160, speed:12},
 {name:"earth", size:28, orbit:200, speed:15},
 {name:"mars", size:22, orbit:240, speed:18},
 {name:"jupiter", size:50, orbit:300, speed:25},
 {name:"saturn", size:45, orbit:360, speed:30},
 {name:"uranus", size:35, orbit:420, speed:35},
 {name:"neptune", size:33, orbit:480, speed:40},
];

planets.forEach(p => {
    const orbit = document.createElement("div");
    orbit.className = "orbit";
    orbit.style.width = p.orbit+"px";
    orbit.style.height = p.orbit+"px";

    const spin = document.createElement("div");
    spin.className = "spin";
    spin.style.animationDuration = p.speed+"s";

    const planet = document.createElement("div");
    planet.className = "planet";
    planet.innerHTML = `<img src="https://source.unsplash.com/100x100/?${p.name},planet" width="${p.size}">`;
    planet.onclick = () => openPlanet(p.name);

    spin.appendChild(planet);
    orbit.appendChild(spin);
    document.body.appendChild(orbit);
});
</script>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
  <div class="card" id="card"></div>
</div>

<script>
const info = {
 mercury:"Gần Mặt Trời nhất 🔥",
 venus:"Nóng nhất hệ 🌡️",
 earth:"Hành tinh sự sống 🌍",
 mars:"Hành tinh đỏ 🔴",
 jupiter:"Lớn nhất 🪐",
 saturn:"Có vành đai 💍",
 uranus:"Nghiêng 98° 😵",
 neptune:"Xa nhất 🌊"
};

function openPlanet(name){
    const overlay = document.getElementById("overlay");
    const card = document.getElementById("card");

    card.innerHTML = `
        <h2>${name.toUpperCase()}</h2>
        <p>${info[name]}</p>
        <button onclick="closeOverlay()">Đóng</button>
    `;

    overlay.style.display = "flex";
}

function closeOverlay(){
    document.getElementById("overlay").style.display = "none";
}

function goHome(){
    window.location.href = "home.html";
}
</script>
