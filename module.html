<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ Mặt Trời</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background-image: url('https://c.pxhere.com/photos/39/83/astronomy_constellation_dark_galaxy_night_night_sky_orion_space-1563485.jpg!d');
    background-size: cover;
    background-repeat: no-repeat
}

h2 { text-align: center; }

.solar-container {
    position: relative;
    width: 90vmin;
    height: 90vmin;
    margin: auto;
    margin-top: 20px;
}

.sun {
    width: 10vmin;
    height: 10vmin;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px orange;
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHiTs_vwFJ9RjqFIzYS8NjQlhOckrzsiIfDw&s');
    background-size: cover;
}

/* ===== NÚT HOME ===== */
.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: #00c6ff;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    z-index: 999;
}

.home-btn:hover {
    background: #0099cc;
}

.o {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: rotate linear infinite;
    pointer-events: none;
    z-index: 1;
}

.planet {
    position: absolute;
    top: 50%;
    right: -2vmin;
    transform: translateY(-50%);
    cursor: pointer;
    border-radius: 50%;
    overflow: hidden;
    pointer-events: auto;
    z-index: 2;
}

.planet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.planet:hover {
    transform: translateY(-50%) scale(2);
}

/* ===== FIX HÀNH TINH QUAY ===== */
@keyframes rotate {
    from {
        transform: translate(-50%, -50%) rotate(0deg);
    }
    to {
        transform: translate(-50%, -50%) rotate(360deg);
    }
}

/* ===== OVERLAY ===== */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.overlay.active {
    display: flex;
}

.overlay-content {
    max-width: 800px;
    max-height: 90vh;
    overflow-y: auto;
    background: #111;
    padding: 20px;
    border-radius: 10px;
}

.planet-page {
    display: none;
}

.planet-page.active {
    display: block;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NÚT HOME -->
<button class="home-btn" onclick="goHome()">🏠 Home</button>

<h2>Hệ Mặt Trời</h2>

<div class="solar-container">
    <div class="sun"></div>

    <!-- GIỮ NGUYÊN -->
    <div class="o" style="width:18vmin;height:18vmin;animation-duration:20s;">
        <div class="planet" onclick="openOverlay('mercury')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg">
        </div>
    </div>

    <div class="o" style="width:26vmin;height:26vmin;animation-duration:30s;">
        <div class="planet" onclick="openOverlay('venus')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg">
        </div>
    </div>

    <div class="o" style="width:34vmin;height:34vmin;animation-duration:40s;">
        <div class="planet" onclick="openOverlay('earth')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
        </div>
    </div>

    <div class="o" style="width:42vmin;height:42vmin;animation-duration:50s;">
        <div class="planet" onclick="openOverlay('mars')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">
        </div>
    </div>
</div>

<p>beta 0.0.1</p>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
    <div class="overlay-content">

        <div id="mercury-page" class="planet-page">
            <h1>Sao Thủy</h1>
            <p>Hành tinh gần Mặt Trời nhất.</p>
        </div>

        <div id="venus-page" class="planet-page">
            <h1>Sao Kim</h1>
            <p>Hành tinh nóng nhất.</p>
        </div>

        <div id="earth-page" class="planet-page">
            <h1>Trái Đất</h1>
            <p>Hành tinh có sự sống.</p>
        </div>

        <div id="mars-page" class="planet-page">
            <h1>Sao Hỏa</h1>
            <p>Hành tinh đỏ.</p>
        </div>

        <button onclick="closeOverlay()">Quay lại</button>
    </div>
</div>

<!-- FIREBASE CHECK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaz1AZHFulAGimlsg98v-jk9mCsjE45Vw",
  authDomain: "password-webtaodangcapvai.firebaseapp.com",
  projectId: "password-webtaodangcapvai"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "index.html";
  }
});
</script>

<script>
function goHome() {
    window.location.href = "home.html";
}

function openOverlay(name) {
    document.getElementById("overlay").classList.add("active");
    document.querySelectorAll(".planet-page").forEach(p => p.classList.remove("active"));
    document.getElementById(name + "-page").classList.add("active");
}

function closeOverlay() {
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
