<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tàu anh qua núi</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#game { width:100vw; height:100vh; position:relative; overflow:visible;}

.home-btn{
    position:fixed;
    top:10px;
    right:10px;
    padding:10px 15px;
    background:#00c6ff;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    z-index:999;
}
#player{
    position:absolute;
    width:60px;
    height:60px;
    background: linear-gradient(to top, cyan, white);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

#player.shield { box-shadow:0 0 20px cyan; }

.obstacle{
    position:absolute;
    width:50px;
    height:50px;
    background:#888;
    border-radius:50%;
}

.laser{
    position:absolute;
    width:4px;
    height:20px;
    background:red;
}

.box{
    position:absolute;
    width:40px;
    height:40px;
    background:gold;
}

.debris{
    position:absolute;
    width:4px;
    height:4px;
    background:gray;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

#mobileControls{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:9999;
    
}

#mobileControls button{
    width:100px;
    height:120px;
    font-size:30px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,0.6);
    color:white;
}

</style>
</head>

<body>

<button class="home-btn" onclick="goHome()">🏠 Home</button>

<div id="game">
    <div id="player"></div>
    <div id="score">0 m</div>

    <div id="menu">
        <h1>🚀 Tàu anh qua núi</h1>
        <button onclick="startGame()">Start</button>
    </div>
</div>

<div id="mobileControls">
    <button id="leftBtn">⬅️</button>
    
    <button id="rightBtn">➡️</button>
    <p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p><p></p>
    <button id="shootBtn">⚔</button>
</div>

<script>
function goHome(){
    window.location.href = "home.html";
}
</script>

<script>
let player = document.getElementById("player");
let scoreText = document.getElementById("score");
let menu = document.getElementById("menu");
let game = document.getElementById("game");

let keys = {};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

let moveLeft = false;
let moveRight = false;
let shooting = false;

document.getElementById("leftBtn").addEventListener("touchstart",()=>moveLeft=true);
document.getElementById("leftBtn").addEventListener("touchend",()=>moveLeft=false);

document.getElementById("rightBtn").addEventListener("touchstart",()=>moveRight=true);
document.getElementById("rightBtn").addEventListener("touchend",()=>moveRight=false);

document.getElementById("shootBtn").addEventListener("touchstart",()=>shooting=true);
document.getElementById("shootBtn").addEventListener("touchend",()=>shooting=false);

let playerX, playerY;
let obstacles=[], lasers=[], boxes=[], debrisList=[];
let gameRunning=false;
let shield=false;
let gunType="basic";
let distance=0;

function hit(x1,y1,w1,h1,x2,y2,w2,h2){
    return x1<x2+w2 && x1+w1>x2 && y1<y2+h2 && y1+h1>y2;
}

function shoot(){
    function createLaser(x,y,speed=10){
        let el=document.createElement("div");
        el.className="laser";
        game.appendChild(el);
        lasers.push({el,x,y,speed});
    }

    let cx = playerX + 30;

    if(gunType==="basic") createLaser(cx-2,playerY);
    else if(gunType==="triple"){
        createLaser(cx-12,playerY);
        createLaser(cx-2,playerY);
        createLaser(cx+8,playerY);
    }
    else if(gunType==="spread"){
        createLaser(cx-20,playerY);
        createLaser(cx-10,playerY);
        createLaser(cx-2,playerY);
        createLaser(cx+8,playerY);
        createLaser(cx+18,playerY);
    }
    else if(gunType==="laser") createLaser(cx-2,playerY,15);
    else if(gunType==="rapid") createLaser(cx-2,playerY);
}

let spawnTimer=0, boxTimer=0, shootCooldown=0;

function startGame(){
    menu.style.display="none";

    playerX=window.innerWidth/2;
    playerY=window.innerHeight-160;

    obstacles=[]; lasers=[]; boxes=[];
    shield=false; gunType="basic"; distance=0;

    gameRunning=true;
    update();
}

function createDebris(){
    for(let i=0;i<20;i++){
        let d=document.createElement("div");
        d.className="debris";
        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;
        let speed=1+Math.random()*2;
        game.appendChild(d);
        debrisList.push({el:d,x,y,speed});
    }
}
function moveDebris(){
    debrisList.forEach(d=>{
        d.y+=d.speed;
        if(d.y>window.innerHeight){
            d.y=0;
            d.x=Math.random()*window.innerWidth;
        }
        d.el.style.left=d.x+"px";
        d.el.style.top=d.y+"px";
    });
}

function update(){
    if(!gameRunning) return;

    if(keys["ArrowLeft"]) playerX-=6;
    if(keys["ArrowRight"]) playerX+=6;

    if(moveLeft) playerX-=6;
    if(moveRight) playerX+=6;

    player.style.left=playerX+"px";
    player.style.top=playerY+"px";

    if((keys["Space"] || shooting) && shootCooldown<=0){
        shoot();
        shootCooldown = (gunType==="rapid")?3:10;
    }
    shootCooldown--;

    distance+=0.1;
    scoreText.innerText=Math.floor(distance)+" m";

    spawnTimer+=16;
    if(spawnTimer>500 && obstacles.length<20){
        spawnTimer=0;
        let el=document.createElement("div");
        el.className="obstacle";
        game.appendChild(el);
        obstacles.push({el,x:Math.random()*(window.innerWidth-50),y:0});
    }

    boxTimer+=16;
    if(boxTimer>3000 && boxes.length<5){
        boxTimer=0;
        let el=document.createElement("div");
        el.className="box";
        game.appendChild(el);
        boxes.push({el,x:Math.random()*(window.innerWidth-40),y:0});
    }

    for(let i=lasers.length-1;i>=0;i--){
        let l=lasers[i];
        l.y-=l.speed;
        l.el.style.left=l.x+"px";
        l.el.style.top=l.y+"px";

        if(l.y<0){
            l.el.remove();
            lasers.splice(i,1);
        }
    }

    for(let i=obstacles.length-1;i>=0;i--){
        let o=obstacles[i];
        o.y+=4;
        o.el.style.left=o.x+"px";
        o.el.style.top=o.y+"px";

        if(hit(playerX,playerY,60,60,o.x,o.y,50,50)){
            if(shield){
                shield=false;
                player.classList.remove("shield");
                o.el.remove();
                obstacles.splice(i,1);
                continue;
            }
            gameRunning=false;
            menu.style.display="flex";
            menu.innerHTML="<h1>Game Over</h1><button onclick='location.reload()'>Restart</button>";
            return;
        }

        for(let j=lasers.length-1;j>=0;j--){
            let l=lasers[j];
            if(hit(l.x,l.y,4,20,o.x,o.y,50,50)){
                o.el.remove();
                l.el.remove();
                obstacles.splice(i,1);
                lasers.splice(j,1);
                break;
            }
        }

        if(o.y>window.innerHeight){
            o.el.remove();
            obstacles.splice(i,1);
        }
    }

    for(let i=boxes.length-1;i>=0;i--){
        let b=boxes[i];
        b.y+=3;
        b.el.style.left=b.x+"px";
        b.el.style.top=b.y+"px";

        if(hit(playerX,playerY,60,60,b.x,b.y,40,40)){
            b.el.remove();
            boxes.splice(i,1);

            let guns=["triple","spread","laser","rapid"];
            if(Math.random()<0.7){
                gunType=guns[Math.floor(Math.random()*guns.length)];
            }else{
                shield=true;
                player.classList.add("shield");
            }
        }
    }

    moveDebris();
    requestAnimationFrame(update);
}

/* INIT */
createDebris();
</script>
    
<script type="module">

</script>

</body>
</html>
