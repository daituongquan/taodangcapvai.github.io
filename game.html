<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Phi Thuyền PRO</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

#game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* SAO 3 LỚP */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
}

/* PLAYER */
#player {
    position: absolute;
    bottom: 40px;
    left: 50%;
    width: 60px;
    height: 60px;
    transform: translateX(-50%);
    background: url('https://img.itch.zone/aW1hZ2UvNjY3NjY4LzM1NjE3MjcucG5n/original/3R%2FZpG.png');
    background-size: contain;
    background-repeat: no-repeat;
    transition: transform 0.1s;
}

/* METEOR */
.obstacle {
    position: absolute;
    width: 50px;
    height: 50px;
    background: url('https://i.imgur.com/OdL0XPt.png');
    background-size: contain;
    background-repeat: no-repeat;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* PARTICLE */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: orange;
}

/* UI */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 10px 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>
    <div id="score">0</div>

    <div id="menu">
        <h1>🚀 Space Survival</h1>
        <button onclick="startGame()">Start</button>
    </div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let scoreText = document.getElementById("score");
let menu = document.getElementById("menu");

let keys = {};
let playerX;
let speed;
let obstacles = [];
let score;
let gameRunning = false;

/* INPUT */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* SAO PARALLAX */
function createStars() {
    for (let i = 0; i < 120; i++) {
        let star = document.createElement("div");
        star.classList.add("star");

        let size = Math.random() * 3;
        star.style.width = size + "px";
        star.style.height = size + "px";

        star.dataset.speed = 1 + Math.random() * 3;

        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.top = Math.random() * window.innerHeight + "px";

        game.appendChild(star);
    }
}

function moveStars() {
    document.querySelectorAll(".star").forEach(star => {
        let y = star.offsetTop + Number(star.dataset.speed);
        if (y > window.innerHeight) {
            y = 0;
            star.style.left = Math.random() * window.innerWidth + "px";
        }
        star.style.top = y + "px";
    });
}

/* SPAWN */
function spawnLoop() {
    if (!gameRunning) return;

    let obs = document.createElement("div");
    obs.classList.add("obstacle");

    obs.style.left = Math.random() * (window.innerWidth - 50) + "px";
    obs.style.top = "0px";

    game.appendChild(obs);
    obstacles.push(obs);

    setTimeout(spawnLoop, 400 + Math.random() * 600);
}

/* EXPLOSION */
function explode(x, y) {
    for (let i = 0; i < 20; i++) {
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = x + "px";
        p.style.top = y + "px";

        game.appendChild(p);

        let angle = Math.random() * 2 * Math.PI;
        let speed = Math.random() * 5;

        let vx = Math.cos(angle) * speed;
        let vy = Math.sin(angle) * speed;

        let life = 30;

        function move() {
            if (life-- <= 0) {
                p.remove();
                return;
            }
            p.style.left = p.offsetLeft + vx + "px";
            p.style.top = p.offsetTop + vy + "px";
            requestAnimationFrame(move);
        }
        move();
    }
}

/* START */
function startGame() {
    menu.style.display = "none";

    playerX = window.innerWidth / 2;
    speed = 4;
    score = 0;
    obstacles = [];
    gameRunning = true;

    spawnLoop();
    update();
}

/* LOOP */
function update() {
    if (!gameRunning) return;

    /* MOVE */
    if (keys["ArrowLeft"]) {
        playerX -= 6;
        player.style.transform = "translateX(-50%) rotate(-15deg)";
    }
    else if (keys["ArrowRight"]) {
        playerX += 6;
        player.style.transform = "translateX(-50%) rotate(15deg)";
    } else {
        player.style.transform = "translateX(-50%) rotate(0deg)";
    }

    if (playerX < 0) playerX = 0;
    if (playerX > window.innerWidth - 60) playerX = window.innerWidth - 60;

    player.style.left = playerX + "px";

    moveStars();

    /* OBSTACLES */
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        let y = obs.offsetTop + speed;
        obs.style.top = y + "px";

        let dx = (player.offsetLeft + 30) - (obs.offsetLeft + 25);
        let dy = (player.offsetTop + 30) - (obs.offsetTop + 25);

        if (Math.sqrt(dx*dx + dy*dy) < 35) {
            explode(player.offsetLeft, player.offsetTop);
            gameRunning = false;

            menu.style.display = "flex";
            menu.innerHTML = `<h1>💥 Game Over</h1><p>${score}</p><button onclick="location.reload()">Restart</button>`;
            return;
        }

        if (y > window.innerHeight) {
            obs.remove();
            obstacles.splice(i, 1);
        }
    }

    /* TĂNG ĐỘ KHÓ */
    speed += 0.002;

    score++;
    scoreText.innerText = score;

    requestAnimationFrame(update);
}

/* INIT */
createStars();
</script>

</body>
</html>
