<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Space Game FINAL</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* GAME */
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* PLAYER */
#player {
    position: absolute;
    bottom: 40px;
    left: 50%;
    width: 60px;
    height: 60px;
    transform: translateX(-50%);
    background: url('https://img.itch.zone/aW1hZ2UvNjY3NjY4LzM1NjE3MjcucG5n/original/3R%2FZpG.png');
    background-size: contain;
    background-repeat: no-repeat;
}

#player.fallback {
    background: cyan;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* METEOR */
.obstacle {
    position: absolute;
    width: 50px;
    height: 50px;
    background: url('https://i.imgur.com/OdL0XPt.png');
    background-size: contain;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* LASER */
.laser {
    position: absolute;
    width: 4px;
    height: 20px;
    background: red;
}

/* DEBRIS */
.debris {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gray;
    opacity: 0.6;
}

/* MENU */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 10px 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>

    <div id="menu">
        <h1>🚀 Space Shooter</h1>
        <button onclick="startGame()">Start</button>
    </div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let menu = document.getElementById("menu");

let keys = {};
let playerX;
let obstacles = [];
let lasers = [];
let debrisList = [];

let gameRunning = false;
let paused = false;

/* FIX mất ảnh */
let img = new Image();
img.src = player.style.backgroundImage.replace(/url\\("|"\\)/g, '');
img.onerror = () => player.classList.add("fallback");

/* INPUT */
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

/* PAUSE khi đổi tab */
document.addEventListener("visibilitychange", () => {
    paused = document.hidden;
});

/* SHOOT */
function shoot() {
    let l = document.createElement("div");
    l.classList.add("laser");

    l.style.left = player.offsetLeft + 28 + "px";
    l.style.top = player.offsetTop + "px";

    game.appendChild(l);
    lasers.push(l);
}

/* DEBRIS */
function createDebris() {
    for (let i = 0; i < 40; i++) {
        let d = document.createElement("div");
        d.classList.add("debris");

        d.style.left = Math.random() * window.innerWidth + "px";
        d.style.top = Math.random() * window.innerHeight + "px";

        d.dataset.speed = 1 + Math.random()*2;

        game.appendChild(d);
        debrisList.push(d);
    }
}

function moveDebris() {
    debrisList.forEach(d => {
        let y = d.offsetTop + Number(d.dataset.speed);

        if (y > window.innerHeight) {
            y = 0;
            d.style.left = Math.random() * window.innerWidth + "px";
        }

        d.style.top = y + "px";
    });
}

/* START */
let spawnTimer = 0;
let spawnDelay = 500;
let shootCooldown = 0;

function startGame() {
    menu.style.display = "none";

    playerX = window.innerWidth / 2;
    obstacles = [];
    lasers = [];

    spawnTimer = 0;
    spawnDelay = 500;

    gameRunning = true;
    update();
}

/* LOOP */
function update() {
    if (!gameRunning) return;
    if (paused) {
        requestAnimationFrame(update);
        return;
    }

    /* MOVE */
    if (keys["ArrowLeft"]) playerX -= 6;
    if (keys["ArrowRight"]) playerX += 6;

    if (playerX < 0) playerX = 0;
    if (playerX > window.innerWidth - 60) playerX = window.innerWidth - 60;

    player.style.left = playerX + "px";

    /* SHOOT HOLD */
    if (keys["Space"] && shootCooldown <= 0) {
        shoot();
        shootCooldown = 10;
    }
    shootCooldown--;

    /* SPAWN FIX */
    spawnTimer += 16;

    if (spawnTimer > spawnDelay) {
        spawnTimer = 0;
        spawnDelay = 400 + Math.random()*600;

        let obs = document.createElement("div");
        obs.classList.add("obstacle");

        obs.style.left = Math.random() * (window.innerWidth - 50) + "px";
        obs.style.top = "0px";

        game.appendChild(obs);
        obstacles.push(obs);
    }

    /* LASER */
    for (let i = lasers.length - 1; i >= 0; i--) {
        let l = lasers[i];
        l.style.top = l.offsetTop - 10 + "px";

        if (l.offsetTop < 0) {
            l.remove();
            lasers.splice(i,1);
        }
    }

    /* METEOR */
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.style.top = o.offsetTop + 4 + "px";

        /* HIT */
        for (let j = lasers.length - 1; j >= 0; j--) {
            let l = lasers[j];

            if (
                l.offsetLeft < o.offsetLeft + 50 &&
                l.offsetLeft + 4 > o.offsetLeft &&
                l.offsetTop < o.offsetTop + 50 &&
                l.offsetTop + 20 > o.offsetTop
            ) {
                o.remove();
                l.remove();
                obstacles.splice(i,1);
                lasers.splice(j,1);
                break;
            }
        }

        if (o.offsetTop > window.innerHeight) {
            o.remove();
            obstacles.splice(i,1);
        }
    }

    moveDebris();

    requestAnimationFrame(update);
}

/* INIT */
createDebris();
</script>

</body>
</html>
