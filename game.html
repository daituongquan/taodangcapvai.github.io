    position: absolute;
    width: 50px;
    height: 50px;
    background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuSkE-TuS2-FfWx-i-_31gLHTZHt1ZBflvFA&s');
    background-size: cover;
}

/* UI */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;

<body>

<div id="game">

    <div id="player"></div>
    <div id="score">Khoảng cách: 0</div>

    <div id="menu">
        <h1>🚀 Game Phi Thuyền</h1>
        <button onclick="startGame()">Bắt đầu</button>
        <button onclick="restartGame()">Chơi lại</button>
    </div>

</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let scoreText = document.getElementById("score");
let menu = document.getElementById("menu");

let playerX;
let speed;
let obstacles;
let score;
let gameRunning;

/* Tạo nền sao */
function createStars() {
    for (let i = 0; i < 100; i++) {
        let star = document.createElement("div");
        star.classList.add("star");

        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.top = Math.random() * window.innerHeight + "px";

        game.appendChild(star);
    }
}

/* Di chuyển sao */
function moveStars() {
    document.querySelectorAll(".star").forEach(star => {
        let y = star.offsetTop;
        star.style.top = (y + 2) + "px";

        if (y > window.innerHeight) {
            star.style.top = "0px";
            star.style.left = Math.random() * window.innerWidth + "px";
        }
    });
}

/* Điều khiển */
document.addEventListener("keydown", (e) => {
    if (!gameRunning) return;

    if (e.key === "ArrowLeft") playerX -= 25;
    if (e.key === "ArrowRight") playerX += 25;
});

/* Tạo thiên thạch */
function createObstacle() {
    if (!gameRunning) return;

    let obs = document.createElement("div");
    obs.classList.add("obstacle");

    let x = Math.random() * (window.innerWidth - 50);
    obs.style.left = x + "px";
    obs.style.top = "0px";

    game.appendChild(obs);
    obstacles.push(obs);
}

/* Bắt đầu */
function startGame() {
    menu.style.display = "none";

    playerX = window.innerWidth / 2;
    speed = 5;
    obstacles = [];
    score = 0;
    gameRunning = true;

    update();
}

/* Chơi lại */
function restartGame() {
    location.reload();
}

/* GAME LOOP */
function update() {
    if (!gameRunning) return;

    player.style.left = playerX + "px";

    moveStars();

    obstacles.forEach((obs, index) => {
        let y = obs.offsetTop;
        obs.style.top = (y + speed) + "px";

        let px = player.offsetLeft;
        let py = player.offsetTop;

        let ox = obs.offsetLeft;
        let oy = obs.offsetTop;

        if (
            px < ox + 50 &&
            px + 60 > ox &&
            py < oy + 50 &&
            py + 60 > oy
        ) {
            gameRunning = false;
            menu.style.display = "flex";
            menu.innerHTML = `
                <h1>💥 Game Over</h1>
                <p>Khoảng cách: ${score}</p>
                <button onclick="restartGame()">Chơi lại</button>
            `;
        }

        if (y > window.innerHeight) {
            obs.remove();
            obstacles.splice(index, 1);
        }
    });

    score++;
    scoreText.innerText = "Khoảng cách: " + score;

    requestAnimationFrame(update);
}

/* spawn thiên thạch */
setInterval(createObstacle, 1000);

/* tạo nền sao */
createStars();
</script>

</body>
</html>
