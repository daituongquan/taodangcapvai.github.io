<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Space Shooter PRO</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
}

/* GAME */
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* PLAYER */
#player {
    position: absolute;
    bottom: 40px;
    left: 50%;
    width: 60px;
    height: 60px;
    transform: translateX(-50%);
    background: url('https://img.itch.zone/aW1hZ2UvNjY3NjY4LzM1NjE3MjcucG5n/original/3R%2FZpG.png');
    background-size: contain;
    background-repeat: no-repeat;
}

/* fallback nếu ảnh lỗi */
#player.fallback {
    background: cyan;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* METEOR */
.obstacle {
    position: absolute;
    width: 50px;
    height: 50px;
    background: url('https://i.imgur.com/OdL0XPt.png');
    background-size: contain;
}

/* LASER */
.laser {
    position: absolute;
    width: 4px;
    height: 20px;
    background: red;
}

/* PARTICLE */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: orange;
}

/* UI */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 10px 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>

    <div id="menu">
        <h1>🚀 Space Shooter</h1>
        <button onclick="startGame()">Start</button>
    </div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let menu = document.getElementById("menu");

let keys = {};
let playerX;
let obstacles = [];
let lasers = [];
let gameRunning = false;

/* FIX mất ảnh */
let img = new Image();
img.src = player.style.backgroundImage.replace(/url\("|"\)/g, '');
img.onerror = () => {
    player.classList.add("fallback");
};

/* INPUT */
document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (e.code === "Space" && gameRunning) shoot();
});
document.addEventListener("keyup", e => keys[e.key] = false);

/* SOUND */
let shootSound = new Audio("https://actions.google.com/sounds/v1/laser/laser_pew_pew.ogg");
let boomSound = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

/* SHOOT */
function shoot() {
    let laser = document.createElement("div");
    laser.classList.add("laser");

    laser.style.left = player.offsetLeft + 28 + "px";
    laser.style.top = player.offsetTop + "px";

    game.appendChild(laser);
    lasers.push(laser);

    shootSound.currentTime = 0;
    shootSound.play();
}

/* SPAWN */
function spawn() {
    if (!gameRunning) return;

    let obs = document.createElement("div");
    obs.classList.add("obstacle");

    obs.style.left = Math.random() * (window.innerWidth - 50) + "px";
    obs.style.top = "0px";

    game.appendChild(obs);
    obstacles.push(obs);

    setTimeout(spawn, 500);
}

/* EXPLOSION */
function explode(x, y) {
    boomSound.currentTime = 0;
    boomSound.play();

    for (let i = 0; i < 15; i++) {
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = x + "px";
        p.style.top = y + "px";

        game.appendChild(p);

        let vx = (Math.random() - 0.5) * 6;
        let vy = (Math.random() - 0.5) * 6;

        let life = 30;

        function move() {
            if (life-- <= 0) return p.remove();
            p.style.left = p.offsetLeft + vx + "px";
            p.style.top = p.offsetTop + vy + "px";
            requestAnimationFrame(move);
        }
        move();
    }
}

/* START */
function startGame() {
    menu.style.display = "none";

    playerX = window.innerWidth / 2;
    obstacles = [];
    lasers = [];
    gameRunning = true;

    spawn();
    update();
}

/* LOOP */
function update() {
    if (!gameRunning) return;

    /* MOVE */
    if (keys["ArrowLeft"]) playerX -= 6;
    if (keys["ArrowRight"]) playerX += 6;

    if (playerX < 0) playerX = 0;
    if (playerX > window.innerWidth - 60) playerX = window.innerWidth - 60;

    player.style.left = playerX + "px";

    /* LASER */
    for (let i = lasers.length - 1; i >= 0; i--) {
        let l = lasers[i];
        l.style.top = l.offsetTop - 10 + "px";

        if (l.offsetTop < 0) {
            l.remove();
            lasers.splice(i,1);
        }
    }

    /* OBSTACLE */
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.style.top = o.offsetTop + 4 + "px";

        /* TRÚNG LASER */
        for (let j = lasers.length - 1; j >= 0; j--) {
            let l = lasers[j];

            if (
                l.offsetLeft < o.offsetLeft + 50 &&
                l.offsetLeft + 4 > o.offsetLeft &&
                l.offsetTop < o.offsetTop + 50 &&
                l.offsetTop + 20 > o.offsetTop
            ) {
                explode(o.offsetLeft, o.offsetTop);

                o.remove();
                l.remove();

                obstacles.splice(i,1);
                lasers.splice(j,1);
                break;
            }
        }

        /* ĐỤNG PLAYER */
        let dx = (player.offsetLeft + 30) - (o.offsetLeft + 25);
        let dy = (player.offsetTop + 30) - (o.offsetTop + 25);

        if (Math.sqrt(dx*dx + dy*dy) < 35) {
            explode(player.offsetLeft, player.offsetTop);
            gameRunning = false;

            menu.style.display = "flex";
            menu.innerHTML = `<h1>💥 Game Over</h1><button onclick="location.reload()">Restart</button>`;
            return;
        }

        if (o.offsetTop > window.innerHeight) {
            o.remove();
            obstacles.splice(i,1);
        }
    }

    requestAnimationFrame(update);
}
</script>

</body>
</html>
