<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login Firebase</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

input {
    display: block;
    margin: 10px auto;
    padding: 8px;
    width: 200px;
}

button {
    padding: 8px 15px;
    margin: 5px;
}
</style>
</head>
<body>

<h2>Đăng ký</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mật khẩu">
<button onclick="register()">Đăng ký</button>

<h2>Đăng nhập</h2>
<button onclick="login()">Đăng nhập</button>
<button onclick="logout()">Đăng xuất</button>

<h3 id="status"></h3>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDaz1AZHFulAGimlsg98v-jk9mCsjE45Vw",
    authDomain: "password-webtaodangcapvai.firebaseapp.com",
    projectId: "password-webtaodangcapvai",
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Đăng ký
window.register = function() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("Đăng ký thành công!"))
    .catch(err => alert(err.message));
}

// Đăng nhập
window.login = function() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => alert("Đăng nhập thành công!"))
    .catch(err => alert(err.message));
}

// Đăng xuất
window.logout = function() {
  signOut(auth);
}

// Tự động giữ đăng nhập
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("status").innerText =
      "Đã đăng nhập: " + user.email;
  } else {
    document.getElementById("status").innerText =
      "Chưa đăng nhập";
  }
});
</script>

</body>
</html>
