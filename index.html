<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  font-family: Arial;
}

.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  color: white;
}

.input-box {
  position: relative;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 8px;
}

.eye {
  position: absolute;
  right: 25px;
  top: 18px;
  cursor: pointer;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
}

#error {
  color: #ff6b6b;
}
</style>
</head>

<body>

<div class="container">
  <h2>Đăng nhập / Đăng ký</h2>

  <input id="email" placeholder="Email">

  <div class="input-box">
    <input id="password" type="password" placeholder="Mật khẩu">
    <span class="eye" onclick="togglePass()">👁️</span>
  </div>

  <button onclick="login()">Đăng nhập</button>
  <button onclick="register()">Đăng ký</button>

  <h4 id="error"></h4>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaz1AZHFulAGimlsg98v-jk9mCsjE45Vw",
  authDomain: "password-webtaodangcapvai.firebaseapp.com",
  projectId: "password-webtaodangcapvai",
  storageBucket: "password-webtaodangcapvai.appspot.com",
  messagingSenderId: "733412823271",
  appId: "1:733412823271:web:70e99dccb5169256925242"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 👁️ hiện/ẩn mật khẩu
window.togglePass = function() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// đăng ký
window.register = function() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("error").innerText = "✅ Đăng ký thành công!";
    })
      .catch(err => {
    if (
    err.code === "auth/email-already-in-use"
  ) {
    document.getElementById("error").innerText =
      "Có thằng tới trước rồi em ạ sài mail khác hộ cái!";
    } else {
    document.getElementById("error").innerText = err.message;
  }
  });
}

// đăng nhập
window.login = function() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      window.location.href = "home.html";
    })
     .catch(err => {
    if (
    err.code === "auth/invalid-credential"
  ) {
    document.getElementById("error").innerText =
      "❌ Sai tài khoản hoặc mật khẩu!";
    } else {
      document.getElementById("error").innerText = "ôi không SOS";
    }
  });
}

// nếu đã login → tự vào home
onAuthStateChanged(auth, user => {
  if (user) {
    window.location.href = "home.html";
  }
});
</script>

</body>
</html>
