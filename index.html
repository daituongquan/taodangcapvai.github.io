<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  font-family: Arial;
}

.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  color: white;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 8px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
}

.toggle {
  margin-top: 10px;
  cursor: pointer;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="title">Đăng nhập</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mật khẩu">

  <button onclick="submitForm()">Tiếp tục</button>

  <div class="toggle" onclick="toggleMode()">
    Chưa có tài khoản? Đăng ký
  </div>

  <h4 id="status"></h4>
</div>

<script type="module">
  // Import the functions you need from the SDKs you need
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDaz1AZHFulAGimlsg98v-jk9mCsjE45Vw",
    authDomain: "password-webtaodangcapvai.firebaseapp.com",
    projectId: "password-webtaodangcapvai",
    storageBucket: "password-webtaodangcapvai.firebasestorage.app",
    messagingSenderId: "733412823271",
    appId: "1:733412823271:web:70e99dccb5169256925242",
    measurementId: "G-RQ20GVJKJP"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;

window.toggleMode = function() {
  isLogin = !isLogin;
  document.getElementById("title").innerText = isLogin ? "Đăng nhập" : "Đăng ký";
}

window.submitForm = function() {
  let email = emailInput.value;
  let pass = password.value;

  if (isLogin) {    
    signInWithEmailAndPassword(auth, email, pass)
      .then(() => window.location.href = "home.html")
      .catch(err => status.innerText = err.message);
  } else {
    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => status.innerText = "Đăng ký thành công!")
      .catch(err => status.innerText = err.message);
  }
}

onAuthStateChanged(auth, user => {
  if (user) {
    window.location.href = "home.html";
  }
});
</script>

</body>
</html>
